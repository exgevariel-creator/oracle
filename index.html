<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-X | Iron-Clad v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --matrix: #00ff41; --bg: #030712; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .neon-border { border: 1px solid rgba(0, 242, 255, 0.4); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .neon-text { text-shadow: 0 0 12px rgba(0, 242, 255, 0.6); }
        .bg-grid { background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(0, 242, 255, 0.1); border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #vault-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        
        /* Markdown Luxury Styling */
        #out h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--neon); margin: 2rem 0 1rem; text-transform: uppercase; border-bottom: 2px solid var(--neon); display: inline-block; padding-bottom: 4px; letter-spacing: 2px; }
        #out h2 { color: var(--matrix); font-weight: 800; margin-top: 1.5rem; font-size: 1.3rem; }
        #out p { margin-bottom: 1.2rem; line-height: 1.9; color: #e2e8f0; font-size: 0.95rem; }
        #out ul { list-style: none; padding-left: 0; margin-bottom: 1.5rem; }
        #out li { margin-bottom: 0.8rem; padding-left: 2rem; position: relative; }
        #out li::before { content: '◈'; position: absolute; left: 0; color: var(--neon); font-weight: bold; }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus { border: 1px solid var(--neon); -webkit-text-fill-color: white; -webkit-box-shadow: 0 0 0px 1000px #030712 inset; transition: background-color 5000s ease-in-out 0s; }
    </style>
</head>
<body class="bg-grid min-h-screen">

    <!-- Auth Layer -->
    <div id="vault-overlay">
        <div class="max-w-md w-full p-10 glass rounded-[3rem] text-center neon-border animate-in fade-in zoom-in duration-500">
            <h2 class="font-orbit text-3xl font-black mb-2 neon-text italic italic">OMNI-X <span class="text-white">NODE</span></h2>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mb-10">Neural Identity Verification</p>
            <div class="space-y-6 text-left">
                <div class="relative">
                    <label class="text-[9px] font-black text-cyan-400 uppercase tracking-widest ml-5 mb-2 block">Google API Secret Key</label>
                    <input type="password" id="vault-key" autofocus class="w-full bg-black/60 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-cyan-500 transition-all text-white placeholder:text-slate-800" placeholder="Paste AIzaSy... here">
                </div>
                <button onclick="authorize()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 hover:brightness-125 py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.4em] transition-all shadow-xl shadow-cyan-900/40 active:scale-95">
                    Connect to Backbone
                </button>
            </div>
            <p class="mt-8 text-[8px] text-slate-600 uppercase tracking-widest leading-relaxed">Key is stored in temporary memory for this session only.</p>
        </div>
    </div>

    <!-- Interface Layer -->
    <div id="app" class="hidden max-w-7xl mx-auto px-5 py-10 lg:py-16">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-10">
            <div class="animate-in slide-in-from-left duration-700">
                <h1 class="font-orbit text-4xl lg:text-5xl font-black tracking-tighter text-white neon-text italic">OMNI-X <span class="text-[var(--neon)]">GHOST</span></h1>
                <div class="flex items-center gap-4 mt-4">
                    <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.5em] text-cyan-500/50">Encrypted Path Established</span>
                </div>
            </div>
            <div class="flex glass p-1.5 rounded-2xl border border-white/10 font-orbit text-[10px] animate-in slide-in-from-right duration-700">
                <button onclick="setMode('creative')" id="btn-c" class="px-8 py-3 rounded-xl bg-cyan-600 text-white font-black shadow-lg transition-all">CREATIVE HUB</button>
                <button onclick="setMode('strategic')" id="btn-s" class="px-8 py-3 rounded-xl text-slate-500 font-black hover:text-white transition-all">STRATEGIC INTEL</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-12">
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-8 animate-in slide-in-from-bottom duration-700 delay-150">
                <div class="glass p-8 rounded-[2.5rem] neon-border">
                    <h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.5em] mb-8 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        Neural Command
                    </h3>
                    <textarea id="cmd-input" class="w-full h-64 bg-black/40 border border-slate-800 rounded-3xl p-6 text-sm font-medium focus:outline-none focus:border-cyan-500/50 transition-all text-slate-200 leading-relaxed" placeholder="Type tactical instructions..."></textarea>
                    
                    <div id="intel-opt" class="hidden mt-8 p-5 bg-emerald-500/5 border border-emerald-500/20 rounded-2xl">
                        <label class="flex items-center gap-4 cursor-pointer group">
                            <input type="checkbox" id="web-search" checked class="w-4 h-4 accent-emerald-500">
                            <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest group-hover:text-emerald-300 transition-all">Deep Web Grounding (Search)</span>
                        </label>
                    </div>

                    <button onclick="execute()" id="exec-btn" class="w-full mt-10 bg-gradient-to-r from-cyan-600 to-indigo-700 hover:brightness-125 py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.5em] transition-all flex items-center justify-center gap-4 shadow-2xl shadow-cyan-950/60 active:scale-95">
                        <span>EXECUTE PROTOCOL</span>
                        <div id="loader" class="spinner hidden"></div>
                    </button>
                </div>
                <button onclick="location.reload()" class="w-full text-[9px] font-bold text-slate-700 uppercase tracking-[0.4em] hover:text-red-500 transition-all flex items-center justify-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2"/></svg>
                    Disconnect Node
                </button>
            </div>

            <!-- Result -->
            <div class="lg:col-span-8 animate-in slide-in-from-bottom duration-700 delay-300">
                <div id="view" class="hidden">
                    <div class="glass p-10 md:p-16 rounded-[3.5rem] shadow-2xl relative overflow-hidden min-h-[600px] border border-white/10">
                        <div class="absolute top-0 right-0 p-8 opacity-5 font-orbit text-4xl pointer-events-none select-none uppercase tracking-[1em]">INTEL</div>
                        <div id="out" class="relative z-10 animate-in fade-in slide-in-from-bottom-4 duration-1000"></div>
                        
                        <div id="src-box" class="mt-16 pt-10 border-t border-white/5 hidden">
                            <h5 class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.5em] mb-6 italic">Validated Intel Sources</h5>
                            <div id="src-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                        </div>
                    </div>
                </div>
                <div id="placeholder" class="h-full flex flex-col items-center justify-center opacity-10 py-32">
                    <div class="w-20 h-20 border-2 border-dashed border-cyan-500/30 rounded-full animate-spin-slow mb-8"></div>
                    <p class="font-orbit text-xs tracking-[0.5em] uppercase font-black">Waiting for Input</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GLOBAL_KEY = "";
        let mode = 'creative';
        const API_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

        // Login Handler
        function authorize() {
            const key = document.getElementById('vault-key').value.trim();
            if(!key.startsWith('AIza')) {
                alert("Protocol Error: API Key format invalid.");
                return;
            }
            
            GLOBAL_KEY = key;
            document.getElementById('vault-overlay').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('vault-overlay').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('app').classList.add('block', 'animate-in', 'fade-in', 'duration-1000');
            }, 500);
        }

        // Support Enter Key to login
        document.getElementById('vault-key').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') authorize();
        });

        function setMode(m) {
            mode = m;
            document.getElementById('btn-c').className = m === 'creative' ? 'px-8 py-3 rounded-xl bg-cyan-600 text-white font-black shadow-lg transition-all' : 'px-8 py-3 rounded-xl text-slate-500 font-black hover:text-white transition-all';
            document.getElementById('btn-s').className = m === 'strategic' ? 'px-8 py-3 rounded-xl bg-emerald-600 text-white font-black shadow-lg transition-all' : 'px-8 py-3 rounded-xl text-slate-500 font-black hover:text-white transition-all';
            document.getElementById('intel-opt').classList.toggle('hidden', m !== 'strategic');
        }

        async function execute() {
            const input = document.getElementById('cmd-input').value.trim();
            if(!input || !GLOBAL_KEY) return;

            const out = document.getElementById('out');
            const view = document.getElementById('view');
            const placeholder = document.getElementById('placeholder');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('exec-btn');

            placeholder.classList.add('hidden');
            view.classList.remove('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            out.innerHTML = `<div class="flex flex-col items-center py-40 opacity-40"><div class="spinner !w-12 !h-12 mb-8"></div><p class="font-orbit text-[10px] font-black tracking-[0.8em] animate-pulse uppercase">Syncing Neural Nodes...</p></div>`;
            document.getElementById('src-box').classList.add('hidden');

            const useSearch = document.getElementById('web-search').checked;
            const system = mode === 'strategic' ? 
                "Kamu adalah Analis Intelijen Strategis NKRI tingkat tinggi. Berikan analisis tajam, kritis, berwibawa. Struktur wajib: 1. Ringkasan Eksekutif, 2. Analisis Aktor & Kepentingan, 3. Proyeksi Strategis (7-30 hari), 4. Rekomendasi Taktis. Format Markdown Mewah." : 
                "Kamu adalah Kreator Konten Digital & Technical Writer Premium. Buat respon yang sangat mendalam, teknis, dan visualis dengan Markdown mewah.";

            try {
                const response = await fetch(`${API_URL}?key=${GLOBAL_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input }] }],
                        systemInstruction: { parts: [{ text: system }] },
                        generationConfig: { temperature: 0.8, topP: 0.95, maxOutputTokens: 8192 },
                        tools: mode === 'strategic' && useSearch ? [{ "google_search": {} }] : []
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(`${data.error.code}: ${data.error.message}`);

                const candidate = data.candidates?.[0];
                const text = candidate?.content?.parts?.[0]?.text;
                const groundings = candidate?.groundingMetadata?.groundingAttributions;

                out.innerHTML = marked.parse(text || "Extraction failed. No data recovered.");
                
                if (groundings?.length > 0) {
                    document.getElementById('src-box').classList.remove('hidden');
                    document.getElementById('src-grid').innerHTML = groundings.map(g => `
                        <a href="${g.web?.uri}" target="_blank" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-[10px] block truncate hover:bg-cyan-500/10 transition-all">
                            <span class="text-cyan-400 font-bold block mb-1 uppercase tracking-tighter">${g.web?.title}</span>
                            <span class="text-slate-600 text-[8px] italic">${g.web?.uri}</span>
                        </a>`).join('');
                }
            } catch (err) {
                out.innerHTML = `<div class="p-10 border border-red-500/30 text-red-400 text-[11px] font-black uppercase tracking-widest text-center glass rounded-3xl animate-pulse">Critical Failure: ${err.message}</div>`;
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
    <style>
        .animate-spin-slow { animation: spin 8s linear infinite; }
    </style>
</body>
</html>
