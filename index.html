<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-X | Black-Box v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --matrix: #00ff41; --bg: #030712; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(0, 242, 255, 0.15); }
        .neon-border { border: 1px solid rgba(0, 242, 255, 0.4); box-shadow: 0 0 25px rgba(0, 242, 255, 0.1); }
        .neon-text { text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); }
        .bg-grid { background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(0, 242, 255, 0.1); border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #vault-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        #out h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--neon); margin: 2rem 0 1rem; border-bottom: 2px solid var(--neon); padding-bottom: 4px; text-transform: uppercase; }
        #out h2 { color: var(--matrix); font-weight: 800; margin-top: 1.5rem; }
        #out p { margin-bottom: 1.2rem; line-height: 1.9; color: #e2e8f0; }
        #out ul { list-style: none; padding-left: 0; }
        #out li { margin-bottom: 0.8rem; padding-left: 2rem; position: relative; }
        #out li::before { content: '◈'; position: absolute; left: 0; color: var(--neon); }
    </style>
</head>
<body class="bg-grid min-h-screen">

    <!-- Auth Layer -->
    <div id="vault-overlay">
        <div class="max-w-md w-full p-10 glass rounded-[3rem] text-center neon-border">
            <h2 class="font-orbit text-3xl font-black mb-2 neon-text italic">OMNI-X <span class="text-white">NODE</span></h2>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mb-10 italic">Secure Protocol Entry</p>
            <div class="space-y-6 text-left">
                <input type="password" id="vault-key" autofocus class="w-full bg-black/60 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-cyan-500 transition-all text-white placeholder:text-slate-800" placeholder="MASUKKAN API KEY">
                <button onclick="authorize()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.5em] transition-all shadow-xl shadow-cyan-900/40">CONNECT TO BACKBONE</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden max-w-7xl mx-auto px-5 py-10 lg:py-16">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-10">
            <div>
                <h1 class="font-orbit text-5xl font-black tracking-tighter text-white neon-text italic">OMNI-X <span class="text-[var(--neon)]">GHOST</span></h1>
                <p class="text-[9px] font-black uppercase tracking-[0.5em] text-cyan-500/50 mt-4">Node Link: Active</p>
            </div>
            <div class="flex glass p-1.5 rounded-2xl border border-white/10 font-orbit text-[10px]">
                <button onclick="setMode('creative')" id="btn-c" class="px-8 py-3 rounded-xl bg-cyan-600 text-white font-black shadow-lg">CREATIVE</button>
                <button onclick="setMode('strategic')" id="btn-s" class="px-8 py-3 rounded-xl text-slate-500 font-black">STRATEGIC</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-12">
            <div class="lg:col-span-4 space-y-8">
                <div class="glass p-8 rounded-[2.5rem] neon-border">
                    <h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.5em] mb-8 italic">Neural Command</h3>
                    <textarea id="cmd-input" class="w-full h-64 bg-black/40 border border-slate-800 rounded-3xl p-6 text-sm focus:outline-none focus:border-cyan-500 transition-all text-slate-200" placeholder="Type instructions..."></textarea>
                    
                    <button onclick="execute()" id="exec-btn" class="w-full mt-10 bg-cyan-600 py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.5em] transition-all flex items-center justify-center gap-4">
                        <span>EXECUTE PROTOCOL</span>
                        <div id="loader" class="spinner hidden"></div>
                    </button>
                </div>
                <button onclick="location.reload()" class="w-full text-[9px] font-bold text-slate-700 uppercase tracking-[0.4em] hover:text-red-500">Disconnect</button>
            </div>

            <div class="lg:col-span-8">
                <div id="view" class="hidden glass p-10 md:p-16 rounded-[3.5rem] min-h-[600px] border border-white/10">
                    <div id="out" class="prose prose-invert max-w-none animate-in fade-in slide-in-from-bottom-4 duration-700"></div>
                </div>
                <div id="placeholder" class="h-full flex flex-col items-center justify-center opacity-10 py-32">
                    <div class="w-20 h-20 border-2 border-dashed border-cyan-500/30 rounded-full animate-spin mb-8"></div>
                    <p class="font-orbit text-xs tracking-[0.5em] uppercase font-black">Awaiting Stream</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GLOBAL_KEY = "";
        let mode = 'creative';

        function authorize() {
            const k = document.getElementById('vault-key').value.trim();
            if(!k.startsWith('AIza')) return alert("Invalid Key!");
            GLOBAL_KEY = k;
            document.getElementById('vault-overlay').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-c').className = m === 'creative' ? 'px-8 py-3 rounded-xl bg-cyan-600 text-white font-black shadow-lg' : 'px-8 py-3 rounded-xl text-slate-500 font-black';
            document.getElementById('btn-s').className = m === 'strategic' ? 'px-8 py-3 rounded-xl bg-emerald-600 text-white font-black shadow-lg' : 'px-8 py-3 rounded-xl text-slate-500 font-black';
        }

        async function execute() {
            const val = document.getElementById('cmd-input').value.trim();
            if(!val || !GLOBAL_KEY) return;

            const out = document.getElementById('out');
            const view = document.getElementById('view');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('exec-btn');

            document.getElementById('placeholder').classList.add('hidden');
            view.classList.remove('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;
            out.innerHTML = `<p class="animate-pulse text-cyan-400 font-black text-center py-20 tracking-widest">DECRYPTING...</p>`;

            const sysMsg = mode === 'strategic' ? 
                "Analisis Intelijen Strategis NKRI. Kritis, Tajam, Berwibawa. Struktur: 1. Ringkasan, 2. Aktor, 3. Prediksi, 4. Rekomendasi." : 
                "Kreator Konten Digital Premium. Gunakan Markdown Mewah.";

            try {
                // FORMAT PAYLOAD PALING AMAN DAN KOMPATIBEL (V1BETA)
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GLOBAL_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${sysMsg}\n\nUser Command: ${val}` }]
                        }]
                    })
                });

                const data = await res.json();
                if(data.error) throw new Error(`${data.error.code}: ${data.error.message}`);

                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No Data.";
                out.innerHTML = marked.parse(text);
            } catch (err) {
                out.innerHTML = `<div class="p-10 border border-red-500/30 text-red-400 text-xs font-black uppercase text-center glass rounded-3xl">FAILURE: ${err.message}</div>`;
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
