<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-X | Terminus v10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --matrix: #00ff41; --bg: #030712; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.1); }
        .neon-border { border: 1px solid rgba(0, 242, 255, 0.3); box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); }
        .neon-text { text-shadow: 0 0 12px rgba(0, 242, 255, 0.6); }
        .bg-grid { background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(0, 242, 255, 0.1); border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #vault-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        #out h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: var(--neon); margin: 2rem 0 1rem; text-transform: uppercase; border-bottom: 2px solid var(--neon); display: inline-block; padding-bottom: 4px; }
        #out h2 { color: var(--matrix); font-weight: 800; margin-top: 1.5rem; }
        #out p { margin-bottom: 1.2rem; line-height: 1.9; color: #cbd5e1; }
        #out ul { list-style: none; padding-left: 0; }
        #out li { margin-bottom: 0.8rem; padding-left: 1.8rem; position: relative; }
        #out li::before { content: '◈'; position: absolute; left: 0; color: var(--neon); font-weight: bold; }
    </style>
</head>
<body class="bg-grid min-h-screen">

    <!-- BYOK Auth Layer -->
    <div id="vault-overlay">
        <div class="max-w-md w-full p-10 glass rounded-[3rem] text-center neon-border">
            <h2 class="font-orbit text-3xl font-black mb-2 neon-text italic italic">TERMINUS <span class="text-white">ACCESS</span></h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em] mb-10 font-bold">Encrypted Connection Required</p>
            <div class="space-y-5 text-left">
                <div>
                    <label class="text-[9px] font-black text-cyan-400 uppercase tracking-widest ml-5 mb-2 block">Google API Identity Key</label>
                    <input type="password" id="vault-key" class="w-full bg-black/50 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-cyan-500 transition-all text-white placeholder:opacity-20" placeholder="AIzaSy...">
                </div>
                <button onclick="unlock()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.4em] transition-all shadow-lg shadow-cyan-900/40">Authorize Node</button>
            </div>
        </div>
    </div>

    <!-- Interface Layer -->
    <div id="app" class="max-w-7xl mx-auto px-5 py-10 lg:py-16 opacity-0 transition-opacity duration-1000">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-10">
            <div>
                <h1 class="font-orbit text-4xl lg:text-5xl font-black tracking-tighter text-white neon-text italic">OMNI-X <span class="text-[var(--neon)]">GHOST</span></h1>
                <div class="flex items-center gap-4 mt-4">
                    <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[9px] font-black uppercase tracking-[0.5em] text-slate-500">System Link: Stable</span>
                </div>
            </div>
            <div class="flex glass p-1.5 rounded-2xl border border-white/10 font-orbit text-[10px]">
                <button onclick="setMode('creative')" id="btn-c" class="px-8 py-3 rounded-xl bg-cyan-600 text-white font-black shadow-lg transition-all">CREATIVE HUB</button>
                <button onclick="setMode('strategic')" id="btn-s" class="px-8 py-3 rounded-xl text-slate-500 font-black hover:text-white transition-all">STRATEGIC INTEL</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-12">
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-8">
                <div class="glass p-8 rounded-[2.5rem] neon-border">
                    <h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.5em] mb-8">Neural Command</h3>
                    <textarea id="cmd-input" class="w-full h-64 bg-black/40 border border-slate-800 rounded-3xl p-6 text-sm font-medium focus:outline-none focus:border-cyan-500/50 transition-all text-slate-300 leading-relaxed scroll-smooth" placeholder="Masukkan instruksi strategis..."></textarea>
                    
                    <div id="intel-opt" class="hidden mt-8 p-5 bg-emerald-500/5 border border-emerald-500/20 rounded-2xl">
                        <label class="flex items-center gap-4 cursor-pointer">
                            <input type="checkbox" id="web-search" checked class="w-4 h-4 accent-emerald-500">
                            <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Live Grounding (Web Search)</span>
                        </label>
                    </div>

                    <button onclick="execute()" id="exec-btn" class="w-full mt-10 bg-gradient-to-r from-cyan-600 to-blue-700 hover:brightness-125 py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.5em] transition-all flex items-center justify-center gap-4 shadow-2xl shadow-cyan-950/50">
                        <span>Execute Protocol</span>
                        <div id="loader" class="spinner hidden"></div>
                    </button>
                </div>
                <button onclick="clearSession()" class="w-full text-[9px] font-bold text-slate-700 uppercase tracking-[0.3em] hover:text-red-500 transition-all">Reset Identity Node</button>
            </div>

            <!-- Result -->
            <div class="lg:col-span-8">
                <div id="view" class="hidden">
                    <div class="glass p-10 md:p-16 rounded-[3.5rem] shadow-2xl relative overflow-hidden min-h-[600px] border border-white/5">
                        <div id="out" class="relative z-10 animate-in fade-in slide-in-from-bottom-8 duration-1000 prose prose-invert max-w-none"></div>
                        <div id="src-box" class="mt-16 pt-10 border-t border-white/5 hidden">
                            <h5 class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.5em] mb-6 italic">Intel Sources</h5>
                            <div id="src-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MENGGUNAKAN ENDPOINT v1 (BUKAN v1beta) UNTUK STABILITAS 1 JUTA PERSEN
        const API_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";
        let mode = 'creative';
        let KEY = sessionStorage.getItem('omni_v10_key');

        window.onload = () => {
            if(KEY) {
                document.getElementById('vault-overlay').classList.add('hidden');
                document.getElementById('app').classList.replace('opacity-0', 'opacity-100');
                document.body.style.overflow = 'auto';
            }
        };

        function unlock() {
            const k = document.getElementById('vault-key').value.trim();
            if(!k.startsWith('AIza')) return alert("API Identity Rejected!");
            sessionStorage.setItem('omni_v10_key', k);
            location.reload();
        }

        function clearSession() {
            sessionStorage.clear();
            location.reload();
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-c').className = m === 'creative' ? 'px-8 py-3 rounded-xl bg-cyan-600 text-white font-black shadow-lg transition-all' : 'px-8 py-3 rounded-xl text-slate-500 font-black hover:text-white transition-all';
            document.getElementById('btn-s').className = m === 'strategic' ? 'px-8 py-3 rounded-xl bg-emerald-600 text-white font-black shadow-lg transition-all' : 'px-8 py-3 rounded-xl text-slate-500 font-black hover:text-white transition-all';
            document.getElementById('intel-opt').classList.toggle('hidden', m !== 'strategic');
        }

        async function execute() {
            const val = document.getElementById('cmd-input').value.trim();
            if(!val || !KEY) return;

            const out = document.getElementById('out');
            const view = document.getElementById('view');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('exec-btn');

            view.classList.remove('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;
            out.innerHTML = `<div class="flex flex-col items-center py-40 opacity-40"><div class="spinner !w-12 !h-12 mb-8"></div><p class="font-orbit text-[10px] font-black tracking-[0.8em] animate-pulse">DECRYPTING NEURAL STREAM...</p></div>`;
            document.getElementById('src-box').classList.add('hidden');

            const useSearch = document.getElementById('web-search').checked;
            const system = mode === 'strategic' ? 
                "Analisis Intelijen Strategis NKRI. Kritis, Tajam, Berwibawa. Struktur: 1. Ringkasan Intelijen, 2. Analisis Aktor, 3. Prediksi Taktis, 4. Rekomendasi Langkah. Gunakan Markdown Mewah." : 
                "Jadilah Kreator Konten Digital/Teknis Premium. Buat respon mendalam dengan Markdown mewah.";

            try {
                const response = await fetch(`${API_URL}?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: val }] }],
                        systemInstruction: { parts: [{ text: system }] },
                        generationConfig: { temperature: 0.7, topP: 0.95, topK: 40, maxOutputTokens: 8192 },
                        tools: mode === 'strategic' && useSearch ? [{ "google_search": {} }] : []
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(`${data.error.code}: ${data.error.message}`);

                const candidate = data.candidates?.[0];
                const text = candidate?.content?.parts?.[0]?.text;
                const groundings = candidate?.groundingMetadata?.groundingAttributions;

                out.innerHTML = marked.parse(text || "No Neural Data Extracted.");
                
                if (groundings?.length > 0) {
                    document.getElementById('src-box').classList.remove('hidden');
                    document.getElementById('src-grid').innerHTML = groundings.map(g => `
                        <a href="${g.web?.uri}" target="_blank" class="p-4 bg-white/5 border border-white/5 rounded-2xl text-[10px] block truncate hover:bg-white/10 transition-all">
                            <span class="text-cyan-400 font-bold">${g.web?.title}</span>
                        </a>`).join('');
                }
            } catch (err) {
                out.innerHTML = `<div class="p-10 border border-red-500/30 text-red-400 text-[11px] font-black uppercase tracking-widest text-center glass rounded-3xl">Critical Breach: ${err.message}</div>`;
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
